<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Badminton Fee Manager Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #ff4d4f; --success: #28a745; --warning: #f2994a; --messenger: #0084ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; color: #202124; }
        .container { max-width: 600px; margin: auto; }
        
        .lang-selector { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 10px; }
        .flag-btn { font-size: 26px; cursor: pointer; filter: grayscale(100%); transition: 0.2s; border: none; background: none; padding: 0; }
        .flag-btn.active { filter: grayscale(0%); transform: scale(1.2); }

        .app-title { text-align: center; background: var(--primary); color: white; padding: 15px; border-radius: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        
        .section-box { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; border: 1px solid #eee; }
        .section-title { font-weight: 800; font-size: 11px; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .slot-config { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 5px; margin-bottom: 8px; align-items: end; background: #f9f9f9; padding: 8px; border-radius: 8px; }
        .slot-input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-weight: bold; box-sizing: border-box; }

        .member-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #eee; }
        .m-name { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-weight: 600; }
        .m-count { width: 40px; text-align: center; padding: 8px 0; border: 1px solid #ddd; border-radius: 6px; background: #eef2f7; font-weight: 800; }
        .checks-container { display: flex; gap: 5px; overflow-x: auto; }
        .check-item { display: flex; flex-direction: column; align-items: center; min-width: 30px; }
        .check-item span { font-size: 8px; font-weight: bold; color: #999; }

        .btn-add-slot { background: var(--warning); color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .btn-del { color: var(--danger); border: 1px solid #ffccc7; width: 30px; height: 30px; border-radius: 50%; background: white; cursor: pointer; flex-shrink: 0; }

        .total-people-box { background: #e8f0fe; color: #1a73e8; padding: 10px; border-radius: 8px; font-weight: 800; text-align: center; margin-bottom: 10px; font-size: 15px; }

        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-download { background: var(--success); color: white; display: none !important; }
        .btn-share { background: var(--messenger); color: white; display: none !important; }
        
        #captureArea { margin-top: 15px; display: none; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #f0f0f0; padding: 10px 5px; text-align: center; }
        .summary-row { background: #f0f7ff; font-weight: bold; font-size: 11px; }
        .total-row { font-weight: 900; background: #f6ffed; color: #389e0d; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <button class="flag-btn active" onclick="setLang('vi', this)">🇻🇳</button>
        <button class="flag-btn" onclick="setLang('en', this)">🇺🇸</button>
        <button class="flag-btn" onclick="setLang('zh', this)">🇨🇳</button>
    </div>

    <div class="app-title" id="t-appTitle">QUẢN LÝ THU TIỀN CẦU LÔNG</div>

    <div class="section-box">
        <div class="section-title">
            <span id="t-cfgTitle">CẤU HÌNH KHUNG GIỜ</span>
            <button class="btn-add-slot" id="t-btnAddSlot" onclick="addSlotConfig()">+ THÊM GIỜ</button>
        </div>
        <div id="slotConfigs"></div>
        <div style="margin-top:10px; font-size:11px; color:#666; display:flex; gap:10px; justify-content: center; flex-wrap: wrap;">
            <span><span id="t-priceSanLbl">Sân/h</span>: <input type="number" id="priceSan" value="22" style="width:35px"></span>
            <span><span id="t-priceCauLbl">Cầu/q</span>: <input type="number" id="priceCau" value="2.5" style="width:35px"></span>
            <span id="t-totalCauLbl">Tổng cầu:</span> <input type="number" id="totalCau" value="13" style="width:35px">
        </div>
    </div>

    <div class="section-box">
        <div class="section-title" id="t-memberTitle">DANH SÁCH NGƯỜI CHƠI</div>
        <div id="memberList"></div>
        <div class="total-people-box">
            <span id="t-totalPeopleLbl">TỔNG SỐ NGƯỜI:</span> <span id="displayTotalPeople">0</span> 👤
        </div>
        <button class="main-btn" id="t-btnAddMember" style="background:#fff; border:2px dashed #ccc" onclick="addMember('', 1)">+ THÊM NGƯỜI</button>
    </div>

    <button class="main-btn btn-calc" id="t-btnCalc" onclick="tinhTien()">LỤM TIỀN</button>
    <button id="btnDownload" class="main-btn btn-download" onclick="downloadImage()">📸 <span id="t-btnDown">TẢI ẢNH</span></button>
    <button id="btnShare" class="main-btn btn-share" onclick="shareImage()">💬 <span id="t-btnShare">CHIA SẺ CHO ĐỒNG BỌN</span></button>

    <div id="captureArea">
        <h3 id="billHeader" style="text-align:center; color:#1a73e8; margin-top:0">🏸 BILL CHI TIẾT</h3>
        <table id="billTable">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="billBody"></tbody>
        </table>
    </div>
</div>

<script>
    const i18n = {
        vi: { 
            appTitle: "QUẢN LÝ THU TIỀN CẦU LÔNG", cfgTitle: "CẤU HÌNH KHUNG GIỜ", totalCauLbl: "Tổng cầu:", priceSanLbl: "Sân/h", priceCauLbl: "Cầu/q", memberTitle: "DANH SÁCH NGƯỜI CHƠI", totalPeopleLbl: "TỔNG SỐ NGƯỜI:", btnAddSlot: "+ THÊM GIỜ", btnAddMember: "+ THÊM NGƯỜI", btnCalc: "LỤM TIỀN", btnDown: "TẢI ẢNH", btnShare: "CHIA SẺ CHO ĐỒNG BỌN", billMain: "BILL CHI TIẾT", total: "TỔNG TIỀN", name: "TÊN", cash: "TIỀN ($)",
            lblSlotName: "TÊN", lblSlotSan: "SÂN", lblSlotHours: "GIỜ"
        },
        en: { 
            appTitle: "BADMINTON FEE MANAGER", cfgTitle: "HOURS CONFIG", totalCauLbl: "Total Shuttle:", priceSanLbl: "Court/h", priceCauLbl: "Shuttle/q", memberTitle: "PLAYER LIST", totalPeopleLbl: "TOTAL MEMBERS:", btnAddSlot: "+ ADD HOUR", btnAddMember: "+ ADD PLAYER", btnCalc: "GET MONEY", btnDown: "DOWNLOAD", btnShare: "SHARE TO MATES", billMain: "DETAILED BILL", total: "TOTAL CASH", name: "NAME", cash: "CASH ($)",
            lblSlotName: "NAME", lblSlotSan: "CRT", lblSlotHours: "HRS"
        },
        zh: { 
            appTitle: "羽毛球费用管理", cfgTitle: "时间段配置", totalCauLbl: "总球数:", priceSanLbl: "场地/时", priceCauLbl: "球/个", memberTitle: "球员名单", totalPeopleLbl: "总人数:", btnAddSlot: "+ 添加时间", btnAddMember: "+ 添加球员", btnCalc: "收款", btnDown: "下载", btnShare: "分享给球友", billMain: "详细账单", total: "合计金额", name: "姓名", cash: "金额 ($)",
            lblSlotName: "名称", lblSlotSan: "场地", lblSlotHours: "小时"
        }
    };

    let slotCount = 0;
    let currentLang = 'vi';
    const initialMembers = [
        {n: "Nhà Khương", c: 4, h1:true, h2:true}, {n: "Nhà Hà", c: 2, h1:true, h2:true}, {n: "Giao", c: 1, h1:true, h2:true}, 
        {n: "Phát", c: 1, h1:true, h2:true}, {n: "Phong", c: 2, h1:true, h2:true}, {n: "Joy", c: 1, h1:true, h2:true},
        {n: "Tân", c: 1, h1:false, h2:true}, {n: "Tuấn", c: 1, h1:false, h2:true}, {n: "Tèo", c: 1, h1:false, h2:true}, {n: "Sam", c: 1, h1:false, h2:true}
    ];

    function setLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const t = i18n[currentLang];
        document.getElementById('t-appTitle').innerText = t.appTitle;
        document.getElementById('t-cfgTitle').innerText = t.cfgTitle;
        document.getElementById('t-totalCauLbl').innerText = t.totalCauLbl;
        document.getElementById('t-priceSanLbl').innerText = t.priceSanLbl;
        document.getElementById('t-priceCauLbl').innerText = t.priceCauLbl;
        document.getElementById('t-memberTitle').innerText = t.memberTitle;
        document.getElementById('t-totalPeopleLbl').innerText = t.totalPeopleLbl;
        document.getElementById('t-btnAddSlot').innerText = t.btnAddSlot;
        document.getElementById('t-btnAddMember').innerText = t.btnAddMember;
        document.getElementById('t-btnCalc').innerText = t.btnCalc;
        document.getElementById('t-btnDown').innerText = t.btnDown;
        document.getElementById('t-btnShare').innerText = t.btnShare;
        
        // Cập nhật nhãn trong phần slot động
        document.querySelectorAll('.slot-lbl-name').forEach(el => el.innerText = t.lblSlotName);
        document.querySelectorAll('.slot-lbl-san').forEach(el => el.innerText = t.lblSlotSan);
        document.querySelectorAll('.slot-lbl-hours').forEach(el => el.innerText = t.lblSlotHours);

        if(document.getElementById('captureArea').style.display === 'block') tinhTien();
    }

    function updateOverallTotal() {
        let total = 0;
        document.querySelectorAll('.m-count').forEach(input => total += (parseFloat(input.value) || 0));
        document.getElementById('displayTotalPeople').innerText = total;
    }

    function addSlotConfig(san = 1, hours = 1) {
        slotCount++;
        const id = slotCount;
        const div = document.createElement('div');
        div.className = 'slot-config';
        div.id = `slot-cfg-${id}`;
        const t = i18n[currentLang];
        div.innerHTML = `
            <div><label class="slot-lbl-name" style="font-size:9px">${t.lblSlotName}</label><input type="text" class="slot-name" value="G${id}" class="slot-input"></div>
            <div><label class="slot-lbl-san" style="font-size:9px">${t.lblSlotSan}</label><input type="number" class="slot-san" value="${san}" class="slot-input"></div>
            <div><label class="slot-lbl-hours" style="font-size:9px">${t.lblSlotHours}</label><input type="number" class="slot-hours" value="${hours}" step="0.5" class="slot-input"></div>
            <button class="btn-del" onclick="removeSlot(${id})">×</button>
        `;
        document.getElementById('slotConfigs').appendChild(div);
        document.querySelectorAll('.member-row').forEach(row => row.querySelector('.checks-container').appendChild(createCheckItem(id)));
    }

    function createCheckItem(slotId) {
        const div = document.createElement('div');
        div.className = 'check-item';
        div.innerHTML = `<span>G${slotId}</span><input type="checkbox" class="m-check-slot" data-slot="${slotId}" checked>`;
        return div;
    }

    function removeSlot(id) {
        document.getElementById(`slot-cfg-${id}`).remove();
        document.querySelectorAll(`.m-check-slot[data-slot="${id}"]`).forEach(el => el.parentElement.remove());
    }

    function addMember(name = "", count = 1, h1 = true, h2 = true) {
        const div = document.createElement('div');
        div.className = 'member-row';
        let checksHtml = "";
        document.querySelectorAll('.slot-config').forEach((s, index) => {
            const sid = s.id.replace('slot-cfg-', '');
            const isChecked = (index === 0) ? h1 : (index === 1 ? h2 : true);
            checksHtml += `<div class="check-item"><span>G${sid}</span><input type="checkbox" class="m-check-slot" data-slot="${sid}" ${isChecked ? 'checked' : ''}></div>`;
        });
        div.innerHTML = `<input type="text" class="m-name" value="${name}" placeholder="Tên"><input type="number" class="m-count" value="${count}" onchange="updateOverallTotal()"><div class="checks-container">${checksHtml}</div><button class="btn-del" onclick="this.parentElement.remove(); updateOverallTotal();">×</button>`;
        document.getElementById('memberList').appendChild(div);
        updateOverallTotal();
    }

    // Khởi tạo
    addSlotConfig(2, 1); 
    addSlotConfig(3, 1); 
    initialMembers.forEach(m => addMember(m.n, m.c, m.h1, m.h2));

    function tinhTien() {
        const t = i18n[currentLang];
        const pSan = parseFloat(document.getElementById('priceSan').value);
        const pCau = parseFloat(document.getElementById('priceCau').value);
        const tCau = parseFloat(document.getElementById('totalCau').value);
        
        let slotsData = [];
        document.querySelectorAll('.slot-config').forEach(el => {
            const id = el.id.replace('slot-cfg-', '');
            slotsData.push({ id, name: el.querySelector('.slot-name').value, moneySan: parseFloat(el.querySelector('.slot-san').value) * parseFloat(el.querySelector('.slot-hours').value) * pSan, totalPeopleInSlot: 0 });
        });

        let members = [];
        let totalAllSlotsPeople = 0;
        document.querySelectorAll('.member-row').forEach(row => {
            const n = row.querySelector('.m-name').value, c = parseFloat(row.querySelector('.m-count').value);
            let mySlots = [];
            row.querySelectorAll('.m-check-slot').forEach(ck => {
                if(ck.checked) {
                    const sid = ck.getAttribute('data-slot');
                    mySlots.push(sid);
                    const sData = slotsData.find(s => s.id == sid);
                    if(sData) sData.totalPeopleInSlot += c;
                }
            });
            if(n) { members.push({n, c, mySlots}); totalAllSlotsPeople += (c * mySlots.length); }
        });

        const moneyPerCau = (tCau * pCau) / (totalAllSlotsPeople || 1);
        let header = `<th>${t.name}</th>`;
        slotsData.forEach(s => header += `<th>${s.name}</th>`);
        header += `<th>${t.cash}</th>`;
        document.getElementById('tableHeader').innerHTML = header;

        let bodyHtml = "", finalGrandTotal = 0;
        members.forEach(m => {
            let totalMoney = 0, rowHtml = `<td style="text-align:left"><b>${m.n}</b> (${m.c})</td>`;
            slotsData.forEach(s => {
                if(m.mySlots.includes(s.id)) {
                    totalMoney += m.c * ((s.moneySan / (s.totalPeopleInSlot || 1)) + moneyPerCau);
                    rowHtml += `<td>✅</td>`;
                } else rowHtml += `<td>-</td>`;
            });
            let rounded = Math.ceil(totalMoney * 10) / 10;
            finalGrandTotal += rounded;
            bodyHtml += `<tr>${rowHtml}<td style="font-weight:800; color:var(--primary)">${rounded.toFixed(1)}</td></tr>`;
        });

        let totalCount = members.reduce((sum, m) => sum + m.c, 0);
        bodyHtml += `<tr class="summary-row"><td colspan="${slotsData.length + 1}" style="text-align:right">${t.totalPeopleLbl} ${totalCount} 👤 | ${t.totalCauLbl} ${tCau} 🏸</td><td>-</td></tr>`;
        bodyHtml += `<tr class="total-row"><td colspan="${slotsData.length + 1}" style="text-align:right">${t.total}:</td><td>$${finalGrandTotal.toFixed(1)}</td></tr>`;
        
        document.getElementById('billHeader').innerText = "🏸 " + t.billMain + " " + new Date().toLocaleDateString();
        document.getElementById('billBody').innerHTML = bodyHtml;
        document.getElementById('captureArea').style.display = 'block';
        document.getElementById('btnDownload').style.setProperty("display", "flex", "important");
        document.getElementById('btnShare').style.setProperty("display", "flex", "important");
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function downloadImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'bill-badminton.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    async function shareImage() {
        const canvas = await html2canvas(document.getElementById('captureArea'));
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'bill.png', { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file], title: 'Bill Cầu Lông', text: 'Lụm tiền nè đồng bọn ơi!' });
        });
    }
</script>
</body>
</html>
